<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; }
  body { background: linear-gradient(125deg, #fdd9e0, #ffe2cf, #e8d4f0, #fde2d4); background-size: 400% 400%; animation: shift 12s ease infinite; position: relative; }
  @keyframes shift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
  .nav { position: relative; z-index: 10; display: flex; align-items: center; gap: 16px; padding: 14px 20px; }
  .logo { display: flex; align-items: center; gap: 8px; font-weight: 700; letter-spacing: .15em; color: #41323a; font-size: 14px; }
  .logo-dot { width: 26px; height: 26px; border-radius: 50%; background: linear-gradient(135deg,#b56576,#d291bc); display: grid; place-items: center; color:#fff; font-size: 12px; }
  .nav a { color: #7a6470; font-size: 11px; text-decoration: none; }
  .nav .cart { margin-left: auto; width: 30px; height: 30px; border-radius: 50%; background: #ffffffdd; display: grid; place-items: center; font-size: 12px; }
  .hero { position: relative; z-index: 10; display: grid; grid-template-columns: 1.1fr .9fr; gap: 16px; padding: 24px 24px 18px; align-items: center; }
  .kicker { display: inline-block; font-size: 9px; padding: 4px 10px; border-radius: 20px; background: #ffffffcc; color: #b56576; font-weight: 600; letter-spacing: .15em; }
  h1 { font-size: 22px; font-weight: 700; color: #41323a; line-height: 1.2; margin-top: 8px; }
  h1 span { background: linear-gradient(135deg,#b56576,#d291bc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .sub { color: #7a6470; font-size: 11px; margin-top: 8px; line-height: 1.5; }
  .btns { display: flex; gap: 8px; margin-top: 12px; }
  .btn { font-size: 10px; padding: 8px 14px; border-radius: 20px; border: 0; font-weight: 600; }
  .btn-p { background: linear-gradient(135deg,#b56576,#d291bc); color: #fff; }
  .btn-g { background: #ffffffdd; color: #41323a; border: 1px solid #ffffff; }
  .hero-img { aspect-ratio: 1; border-radius: 24px; background: linear-gradient(135deg,#fcd5ce,#e8a2b8); display: grid; place-items: center; box-shadow: 0 12px 30px rgba(180,100,120,.3); color: #fff; font-size: 36px; }
  .products { position: relative; z-index: 10; padding: 6px 24px 24px; }
  .p-title { font-size: 13px; font-weight: 700; color: #41323a; margin-bottom: 10px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .pcard { background: #ffffffdd; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.05); border: 1px solid #ffffff; }
  .pimg { aspect-ratio: 1; background: linear-gradient(135deg, var(--c1, #fcd5ce), var(--c2, #d291bc)); }
  .pinfo { padding: 8px 10px; }
  .pname { font-size: 10px; color: #41323a; font-weight: 600; }
  .pprice { font-size: 10px; color: #b56576; font-weight: 700; margin-top: 2px; }
</style></head>
<body>
  
  <nav class="nav">
    <div class="logo"><div class="logo-dot">✿</div> AVYUKTA</div>
    <a href="#">Home</a><a href="#">Shop</a><a href="#">Track</a><a href="#">Account</a>
    <div class="cart">🛍️</div>
  </nav>
  <section class="hero">
    <div>
      <span class="kicker">✿ HANDMADE GIFTS</span>
      <h1>Gifts made by hand,<br><span>straight from the heart</span></h1>
      <p class="sub">Discover one-of-a-kind handmade candles, crochet flowers, resin keepsakes and luxury hampers.</p>
      <div class="btns"><button class="btn btn-p">Shop now</button><button class="btn btn-g">Browse</button></div>
    </div>
    <div class="hero-img">🌸</div>
  </section>
  <section class="products">
    <div class="p-title">Featured Treasures</div>
    <div class="grid">
      <div class="pcard"><div class="pimg" style="--c1:#fcd5ce;--c2:#d291bc"></div><div class="pinfo"><div class="pname">Rose Bouquet</div><div class="pprice">Rs. 1,200</div></div></div>
      <div class="pcard"><div class="pimg" style="--c1:#fde2d4;--c2:#e8a2b8"></div><div class="pinfo"><div class="pname">Candle Set</div><div class="pprice">Rs. 850</div></div></div>
      <div class="pcard"><div class="pimg" style="--c1:#f6bdc8;--c2:#b56576"></div><div class="pinfo"><div class="pname">Gift Hamper</div><div class="pprice">Rs. 2,500</div></div></div>
    </div>
  </section>
</body></html>
