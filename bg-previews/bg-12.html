<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; }
  body { background: #fffaf0; position: relative; }
  
      .spark { position:absolute; pointer-events:none; opacity:.7; animation: twinkle 2.5s ease-in-out infinite; }
      @keyframes twinkle { 0%,100%{opacity:.2; transform:scale(.6)} 50%{opacity:1; transform:scale(1)} }
    
  .nav { position: relative; z-index: 10; display: flex; align-items: center; gap: 16px; padding: 14px 20px; }
  .logo { display: flex; align-items: center; gap: 8px; font-weight: 700; letter-spacing: .15em; color: #41323a; font-size: 14px; }
  .logo-dot { width: 26px; height: 26px; border-radius: 50%; background: linear-gradient(135deg,#b56576,#d291bc); display: grid; place-items: center; color:#fff; font-size: 12px; }
  .nav a { color: #8c737e; font-size: 11px; text-decoration: none; }
  .nav .cart { margin-left: auto; width: 30px; height: 30px; border-radius: 50%; background: #ffffff; display: grid; place-items: center; font-size: 12px; }
  .hero { position: relative; z-index: 10; display: grid; grid-template-columns: 1.1fr .9fr; gap: 16px; padding: 24px 24px 18px; align-items: center; }
  .kicker { display: inline-block; font-size: 9px; padding: 4px 10px; border-radius: 20px; background: #ffffffbb; color: #b56576; font-weight: 600; letter-spacing: .15em; }
  h1 { font-size: 22px; font-weight: 700; color: #41323a; line-height: 1.2; margin-top: 8px; }
  h1 span { background: linear-gradient(135deg,#b56576,#d291bc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .sub { color: #8c737e; font-size: 11px; margin-top: 8px; line-height: 1.5; }
  .btns { display: flex; gap: 8px; margin-top: 12px; }
  .btn { font-size: 10px; padding: 8px 14px; border-radius: 20px; border: 0; font-weight: 600; }
  .btn-p { background: linear-gradient(135deg,#b56576,#d291bc); color: #fff; }
  .btn-g { background: #ffffff; color: #41323a; border: 1px solid #fcd5ce80; }
  .hero-img { aspect-ratio: 1; border-radius: 24px; background: linear-gradient(135deg,#fcd5ce,#e8a2b8); display: grid; place-items: center; box-shadow: 0 12px 30px rgba(180,100,120,.3); color: #fff; font-size: 36px; }
  .products { position: relative; z-index: 10; padding: 6px 24px 24px; }
  .p-title { font-size: 13px; font-weight: 700; color: #41323a; margin-bottom: 10px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .pcard { background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.05); border: 1px solid #fcd5ce80; }
  .pimg { aspect-ratio: 1; background: linear-gradient(135deg, var(--c1, #fcd5ce), var(--c2, #d291bc)); }
  .pinfo { padding: 8px 10px; }
  .pname { font-size: 10px; color: #41323a; font-weight: 600; }
  .pprice { font-size: 10px; color: #b56576; font-weight: 700; margin-top: 2px; }
</style></head>
